name: Release Flix

on:
  push:
    branches: [disabled]

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            os: ubuntu-latest
            archive_ext: tar.gz
          - target: macos-arm64
            os: macos-latest
            archive_ext: tar.gz
          - target: windows-x86_64
            os: windows-latest
            archive_ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # --- System dependencies ---

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libonig-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install gstreamer pkg-config

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          $GstVersion = "1.24.12"
          $BaseUrl = "https://gstreamer.freedesktop.org/data/pkg/windows/$GstVersion"

          Invoke-WebRequest -Uri "$BaseUrl/msvc/gstreamer-1.0-msvc-x86_64-$GstVersion.msi" -OutFile gstreamer-runtime.msi
          Start-Process msiexec.exe -Wait -ArgumentList '/i gstreamer-runtime.msi /quiet /norestart ADDLOCAL=ALL'

          Invoke-WebRequest -Uri "$BaseUrl/msvc/gstreamer-1.0-devel-msvc-x86_64-$GstVersion.msi" -OutFile gstreamer-devel.msi
          Start-Process msiexec.exe -Wait -ArgumentList '/i gstreamer-devel.msi /quiet /norestart ADDLOCAL=ALL'

          $GstRoot = "C:\gstreamer\1.0\msvc_x86_64"
          echo "GSTREAMER_1_0_ROOT_MSVC_X86_64=$GstRoot" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=$GstRoot\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "$GstRoot\bin" >> $env:GITHUB_PATH
        shell: pwsh

      # --- Frontend build ---

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter flix build

      # --- Backend build ---

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Build backend
        run: cargo build --release --bin mhaol-server

      - name: Strip binary
        if: runner.os != 'Windows'
        run: strip target/release/mhaol-server

      # --- Package bundle ---

      - name: Package bundle (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          BUNDLE="mhaol-flix-${{ matrix.target }}"
          mkdir -p "$BUNDLE"
          cp target/release/mhaol-server "$BUNDLE/"
          cp -r apps/flix/dist-static "$BUNDLE/dist-static"

          cat > "$BUNDLE/start.sh" << 'EOF'
          #!/usr/bin/env bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          export STATIC_DIR="$SCRIPT_DIR/dist-static"
          export PORT="${PORT:-1530}"
          exec "$SCRIPT_DIR/mhaol-server" "$@"
          EOF
          chmod +x "$BUNDLE/start.sh"

          tar -czf "mhaol-flix-${TAG}-${{ matrix.target }}.tar.gz" "$BUNDLE"

      - name: Package bundle (Windows)
        if: runner.os == 'Windows'
        run: |
          $Tag = "${{ github.ref_name }}"
          $Bundle = "mhaol-flix-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $Bundle -Force
          Copy-Item "target\release\mhaol-server.exe" "$Bundle\"
          Copy-Item -Recurse "apps\flix\dist-static" "$Bundle\dist-static"

          # Copy GStreamer runtime DLLs so the binary works without a separate install
          $GstBin = "C:\gstreamer\1.0\msvc_x86_64\bin"
          if (Test-Path $GstBin) {
            Copy-Item "$GstBin\*.dll" "$Bundle\"
          }

          @"
          @echo off
          set SCRIPT_DIR=%~dp0
          set STATIC_DIR=%SCRIPT_DIR%dist-static
          if "%PORT%"=="" set PORT=1530
          "%SCRIPT_DIR%mhaol-server.exe" %*
          "@ | Out-File -Encoding ascii "$Bundle\start.bat"

          Compress-Archive -Path "$Bundle" -DestinationPath "mhaol-flix-${Tag}-${{ matrix.target }}.zip"
        shell: pwsh

      # --- Upload to release ---

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mhaol-flix-*.${{ matrix.archive_ext }}
          generate_release_notes: true
