name: Release Headless (Linux)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libonig-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            clang \
            libclang-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter frontend build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Build mhaol-headless
        run: cargo build --release --bin mhaol-headless

      - name: Strip binary
        run: strip target/release/mhaol-headless

      - name: Package binary
        id: pkg
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="$(git rev-parse --short HEAD)"
          fi
          OUT="mhaol-headless-${TAG}-linux-x86_64"
          cp target/release/mhaol-headless "$OUT"
          chmod +x "$OUT"
          tar -czf "${OUT}.tar.gz" "$OUT"
          sha256sum "$OUT" "${OUT}.tar.gz" > "${OUT}.sha256"
          echo "out=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.out }}
          path: |
            ${{ steps.pkg.outputs.out }}
            ${{ steps.pkg.outputs.out }}.tar.gz
            ${{ steps.pkg.outputs.out }}.sha256
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.out }}
            ${{ steps.pkg.outputs.out }}.tar.gz
            ${{ steps.pkg.outputs.out }}.sha256
