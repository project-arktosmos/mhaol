name: Tauri Build

on:
  workflow_call:
    inputs:
      app:
        description: 'App to build (tube, cloud)'
        required: true
        type: string
      platform:
        description: 'Platform (macos-latest, ubuntu-latest, windows-latest)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ inputs.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync Tauri assets
        run: bash packages/tauri/scripts/sync-assets.sh apps/${{ inputs.app }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libonig-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/${{ inputs.app }}
          tagName: v__VERSION__-${{ inputs.app }}
          releaseName: '${{ inputs.app }} v__VERSION__'
          releaseBody: 'Desktop build for ${{ inputs.app }}'
          releaseDraft: true
