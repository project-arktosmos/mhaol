name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libonig-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm -r --filter frontend build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Build release binaries
        run: cargo build --release --bin mhaol-server --bin p2p-stream-worker --features mhaol-backend/embed-frontend

      - name: Strip binaries
        run: |
          strip target/release/mhaol-server
          strip target/release/p2p-stream-worker

      - name: Package binaries
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cp target/release/mhaol-server mhaol-server-${TAG}-linux-x86_64
          cp target/release/p2p-stream-worker p2p-stream-worker-${TAG}-linux-x86_64
          chmod +x mhaol-server-${TAG}-linux-x86_64
          chmod +x p2p-stream-worker-${TAG}-linux-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mhaol-server-*-linux-x86_64
            p2p-stream-worker-*-linux-x86_64
          generate_release_notes: true
