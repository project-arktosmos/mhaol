name: Website (deploy each PR to GitHub Pages)

# Builds apps/website (mhaol-website) and deploys it to GitHub Pages on
# every pull request that touches the website or its dependencies.
#
# Notes:
# - GitHub Pages only hosts one site per repo, so the deploy from the most
#   recent PR is what's live. PRs deploying concurrently will queue through
#   the `github-pages` environment.
# - The `id-token: write` permission is not granted to PRs from forks; the
#   deploy step will fail in that case. Same-repo branch PRs work fine.
#
# One-time repo setup: Settings → Pages → Build and deployment →
# Source = "GitHub Actions". The workflow handles everything else.

on:
  pull_request:
    paths:
      - 'apps/website/**'
      - 'packages/cloud-ui/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/website-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: website-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter mhaol-website lint

      - name: Type-check
        run: pnpm --filter mhaol-website check

      - name: Build
        env:
          # GitHub Pages serves project sites at https://<owner>.github.io/<repo>/
          # so the SPA needs to know its base path at build time. svelte.config.js
          # already reads BASE_PATH; we feed it the repo name here.
          BASE_PATH: /${{ github.event.repository.name }}
        run: pnpm --filter mhaol-website build

      - name: Add SPA fallback (404.html)
        # GitHub Pages serves 404.html for any path it doesn't recognise — by
        # copying the SPA shell there, deep links keep working through the
        # client router.
        run: cp apps/website/dist-static/index.html apps/website/dist-static/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/website/dist-static

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
