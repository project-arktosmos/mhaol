name: Website (build on PRs, deploy main to GitHub Pages)

# Builds apps/website (mhaol-website) and deploys it to GitHub Pages.
#
# - On every PR that touches the website or its dependencies, runs lint +
#   svelte-check + production build, and uploads the dist as a workflow
#   artifact for review. No deploy on PRs.
# - On push to `main` (and manual dispatch), runs the same build, then
#   publishes apps/website/dist-static/ to GitHub Pages.
#
# One-time repo setup: Settings → Pages → Build and deployment →
# Source = "GitHub Actions". The workflow handles everything else.

on:
  pull_request:
    paths:
      - 'apps/website/**'
      - 'packages/cloud-ui/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/website-pages.yml'
  push:
    branches: [main]
    paths:
      - 'apps/website/**'
      - 'packages/cloud-ui/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/website-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: website-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter mhaol-website lint

      - name: Type-check
        run: pnpm --filter mhaol-website check

      - name: Build
        env:
          # GitHub Pages serves project sites at https://<owner>.github.io/<repo>/
          # so the SPA needs to know its base path at build time. svelte.config.js
          # already reads BASE_PATH; we feed it the repo name here.
          BASE_PATH: /${{ github.event.repository.name }}
        run: pnpm --filter mhaol-website build

      - name: Add SPA fallback (404.html)
        # GitHub Pages serves 404.html for any path it doesn't recognise — by
        # copying the SPA shell there, deep links keep working through the
        # client router.
        run: cp apps/website/dist-static/index.html apps/website/dist-static/404.html

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/website/dist-static

      - name: Upload PR preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: apps/website/dist-static
          if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
