name: Release Desktop Apps

on:
  push:
    branches: [disabled]

permissions:
  contents: write

jobs:
  determine-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          if [ "${{ inputs.apps }}" = "all" ]; then
            echo 'matrix={"app":["tube"],"platform":["macos-latest","ubuntu-latest","windows-latest"]}' >> "$GITHUB_OUTPUT"
          else
            IFS=',' read -ra APPS <<< "${{ inputs.apps }}"
            JSON=$(printf '"%s",' "${APPS[@]}" | sed 's/,$//')
            echo "matrix={\"app\":[$JSON],\"platform\":[\"macos-latest\",\"ubuntu-latest\",\"windows-latest\"]}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: determine-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-matrix.outputs.matrix) }}
    uses: ./.github/workflows/tauri-build.yml
    with:
      app: ${{ matrix.app }}
      platform: ${{ matrix.platform }}
    secrets: inherit
