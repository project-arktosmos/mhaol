name: Release Mhaol Cloud + Headless (multi-platform)

# Builds:
#   - apps/cloud Tauri shell ("Mhaol Cloud") for macOS (universal),
#     Linux (x86_64), and Windows (x86_64).
#   - apps/headless bin ("mhaol-headless") for Linux (x86_64).
# Attaches every produced installer / archive to the published release.
# Does not build the standalone mhaol-cloud bin or the Android shells.
#
# All artifacts are renamed on stage so the filename always identifies
# both the app (cloud vs headless) and the target OS / arch — e.g.
# `mhaol-cloud-macos-universal.dmg`, `mhaol-headless-linux-x86_64.tar.gz`.
#
# Bundles are UNSIGNED. macOS Gatekeeper and Windows SmartScreen will warn
# users on first launch; this is intentional — code signing requires paid
# certs we don't intend to obtain.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.app }} for ${{ matrix.arch_label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: cloud
            platform: macos-latest
            arch_label: macos-universal
            tauri_target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - app: cloud
            platform: ubuntu-22.04
            arch_label: linux-x86_64
            tauri_target: ''
            rust_targets: ''
          - app: cloud
            platform: windows-latest
            arch_label: windows-x86_64
            tauri_target: ''
            rust_targets: ''
          - app: headless
            platform: ubuntu-22.04
            arch_label: linux-x86_64
            tauri_target: ''
            rust_targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install GStreamer (macOS, universal)
        if: matrix.app == 'cloud' && startsWith(matrix.platform, 'macos')
        run: |
          PKG_VER=1.24.10
          BASE="https://gstreamer.freedesktop.org/data/pkg/osx/${PKG_VER}"
          curl -fsSL -o /tmp/gst-runtime.pkg "${BASE}/gstreamer-1.0-${PKG_VER}-universal.pkg"
          curl -fsSL -o /tmp/gst-devel.pkg   "${BASE}/gstreamer-1.0-devel-${PKG_VER}-universal.pkg"
          sudo installer -pkg /tmp/gst-runtime.pkg -target /
          sudo installer -pkg /tmp/gst-devel.pkg   -target /
          echo "PKG_CONFIG_PATH=/Library/Frameworks/GStreamer.framework/Versions/1.0/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=/Library/Frameworks/GStreamer.framework/Versions/1.0/lib" >> "$GITHUB_ENV"

      - name: Install Linux deps (cloud Tauri shell)
        if: matrix.app == 'cloud' && startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            patchelf \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev

      - name: Install GStreamer (Windows, MSVC x86_64)
        if: matrix.app == 'cloud' && startsWith(matrix.platform, 'windows')
        shell: pwsh
        run: |
          choco install pkgconfiglite -y --allow-empty-checksums
          $ver = "1.24.10"
          $base = "https://gstreamer.freedesktop.org/data/pkg/windows/$ver/msvc"
          $runtime = "$env:RUNNER_TEMP\gst-runtime.msi"
          $devel   = "$env:RUNNER_TEMP\gst-devel.msi"
          Invoke-WebRequest -Uri "$base/gstreamer-1.0-msvc-x86_64-$ver.msi"       -OutFile $runtime
          Invoke-WebRequest -Uri "$base/gstreamer-1.0-devel-msvc-x86_64-$ver.msi" -OutFile $devel
          Start-Process msiexec -ArgumentList "/i `"$runtime`" /qn /norestart ADDLOCAL=ALL" -Wait
          Start-Process msiexec -ArgumentList "/i `"$devel`" /qn /norestart ADDLOCAL=ALL" -Wait
          $root = "C:\gstreamer\1.0\msvc_x86_64"
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$root\"      | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PKG_CONFIG_PATH=$root\lib\pkgconfig"        | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$root\bin"                                  | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install Linux deps (headless bin)
        if: matrix.app == 'headless' && startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          key: ${{ matrix.app }}-${{ matrix.arch_label }}

      - name: Install Tauri CLI
        if: matrix.app == 'cloud'
        run: cargo install --locked tauri-cli --version "^2"

      - name: Build cloud Tauri bundle
        if: matrix.app == 'cloud'
        working-directory: apps/cloud
        shell: bash
        run: |
          if [[ -n "${{ matrix.tauri_target }}" ]]; then
            cargo tauri build --target "${{ matrix.tauri_target }}"
          else
            cargo tauri build
          fi

      - name: Build headless bin
        if: matrix.app == 'headless'
        shell: bash
        run: pnpm build:headless

      - name: Stage cloud artifacts
        if: matrix.app == 'cloud'
        shell: bash
        run: |
          mkdir -p dist-release
          NAME="mhaol-cloud-${{ matrix.arch_label }}"
          case "${{ runner.os }}" in
            macOS)
              BUNDLE="target/${{ matrix.tauri_target }}/release/bundle"
              for f in "$BUNDLE"/dmg/*.dmg; do
                [[ -e "$f" ]] || continue
                cp "$f" "dist-release/${NAME}.dmg"
              done
              if compgen -G "$BUNDLE/macos/*.app" > /dev/null; then
                ( cd "$BUNDLE/macos" && for app in *.app; do
                    zip -ry "$GITHUB_WORKSPACE/dist-release/${NAME}.app.zip" "$app"
                  done )
              fi
              ;;
            Linux)
              BUNDLE="target/release/bundle"
              for f in "$BUNDLE"/deb/*.deb; do
                [[ -e "$f" ]] || continue
                cp "$f" "dist-release/${NAME}.deb"
              done
              for f in "$BUNDLE"/appimage/*.AppImage; do
                [[ -e "$f" ]] || continue
                cp "$f" "dist-release/${NAME}.AppImage"
              done
              for f in "$BUNDLE"/rpm/*.rpm; do
                [[ -e "$f" ]] || continue
                cp "$f" "dist-release/${NAME}.rpm"
              done
              ;;
            Windows)
              BUNDLE="target/release/bundle"
              for f in "$BUNDLE"/msi/*.msi; do
                [[ -e "$f" ]] || continue
                cp "$f" "dist-release/${NAME}.msi"
              done
              for f in "$BUNDLE"/nsis/*.exe; do
                [[ -e "$f" ]] || continue
                cp "$f" "dist-release/${NAME}-setup.exe"
              done
              ;;
          esac
          if [[ -z "$(ls -A dist-release 2>/dev/null)" ]]; then
            echo "::error::no Tauri bundle artifacts produced for ${{ matrix.arch_label }}"
            exit 1
          fi
          ls -la dist-release/

      - name: Stage headless artifact
        if: matrix.app == 'headless'
        shell: bash
        run: |
          mkdir -p dist-release stage/mhaol-headless
          cp target/release/mhaol-headless stage/mhaol-headless/
          chmod +x stage/mhaol-headless/mhaol-headless
          tar -czvf "dist-release/mhaol-headless-${{ matrix.arch_label }}.tar.gz" -C stage mhaol-headless
          ls -la dist-release/

      - name: Generate checksums
        shell: bash
        working-directory: dist-release
        run: |
          if command -v shasum >/dev/null; then
            shasum -a 256 * > SHA256SUMS-${{ matrix.app }}-${{ matrix.arch_label }}.txt
          else
            sha256sum * > SHA256SUMS-${{ matrix.app }}-${{ matrix.arch_label }}.txt
          fi
          cat SHA256SUMS-${{ matrix.app }}-${{ matrix.arch_label }}.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mhaol-${{ matrix.app }}-${{ matrix.arch_label }}
          path: dist-release/*
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          fail_on_unmatched_files: true
