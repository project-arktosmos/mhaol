name: Release Mhaol Cloud + Headless (multi-platform)

# Builds:
#   - apps/cloud Tauri shell ("Mhaol Cloud") for macOS (aarch64), Linux
#     (x86_64), and Windows (x86_64, MinGW / GNU ABI).
#   - apps/headless bin ("mhaol-headless") for Linux (x86_64).
# Attaches every produced installer / archive to the published release.
# Does not build the standalone mhaol-cloud bin or the Android shells.
#
# All artifacts are renamed on stage so the filename always identifies
# both the app (cloud vs headless) and the target OS / arch — e.g.
# `mhaol-cloud-macos-aarch64.dmg`, `mhaol-headless-linux-x86_64.tar.gz`.
#
# Bundles are UNSIGNED. macOS Gatekeeper and Windows SmartScreen will warn
# users on first launch; this is intentional — code signing requires paid
# certs we don't intend to obtain.
#
# Windows toolchain note:
# `gstreamer-sys` requires GStreamer present on the build host. The
# official Windows MSVC MSIs at https://gstreamer.freedesktop.org/data/pkg/windows/
# are fronted by the `go-away` JS proof-of-work and reject every CI HTTP
# client (curl, Invoke-WebRequest, choco, winget). We sidestep that by
# pulling pre-built MinGW GStreamer packages from MSYS2's pacman mirrors
# and building Rust against the `x86_64-pc-windows-gnu` target — same
# library, different ABI, no anti-bot wall in the path.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.app }} for ${{ matrix.arch_label }}
    # Public-tier API keys baked into release artifacts via `option_env!`
    # in `packages/backend/src/lib.rs::load_embedded_defaults`. Exposing
    # them is intentional — the released app ships with a working catalog
    # / metadata flow out of the box. Self-hosters can override at runtime
    # via `.env` or process env.
    env:
      TMDB_API_KEY: b89969fa17583b9f1cf07486dc609d25
      OMDB_API_KEY: 43c10357
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: cloud
            platform: macos-latest
            arch_label: macos-aarch64
            tauri_target: aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          - app: cloud
            platform: ubuntu-22.04
            arch_label: linux-x86_64
            tauri_target: ''
            rust_targets: ''
          - app: cloud
            platform: windows-latest
            arch_label: windows-x86_64
            tauri_target: x86_64-pc-windows-gnu
            rust_targets: x86_64-pc-windows-gnu
          - app: headless
            platform: ubuntu-22.04
            arch_label: linux-x86_64
            tauri_target: ''
            rust_targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install GStreamer (macOS, brew)
        if: matrix.app == 'cloud' && startsWith(matrix.platform, 'macos')
        run: |
          brew update
          brew install pkg-config gstreamer
          GST_PREFIX="$(brew --prefix gstreamer)"
          BREW_PREFIX="$(brew --prefix)"
          echo "PKG_CONFIG_PATH=${BREW_PREFIX}/lib/pkgconfig:${GST_PREFIX}/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=${GST_PREFIX}/lib:${BREW_PREFIX}/lib" >> "$GITHUB_ENV"

      - name: Install Linux deps (cloud Tauri shell)
        if: matrix.app == 'cloud' && startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            patchelf \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev

      - name: Install Linux deps (headless bin)
        if: matrix.app == 'headless' && startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev

      - name: Install MSYS2 + GStreamer (Windows, cloud)
        if: matrix.app == 'cloud' && startsWith(matrix.platform, 'windows')
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-gstreamer
            mingw-w64-x86_64-gst-plugins-base
            mingw-w64-x86_64-gst-plugins-good
            mingw-w64-x86_64-gst-plugins-bad

      - name: Expose MSYS2 toolchain to subsequent steps (Windows, cloud)
        if: matrix.app == 'cloud' && startsWith(matrix.platform, 'windows')
        shell: msys2 {0}
        run: |
          # Export MSYS2's mingw64 prefix so cargo / pkg-config can find
          # gstreamer-1.0 and friends from the non-MSYS2 build steps below.
          # The Rust host toolchain installed by dtolnay/rust-toolchain is
          # x86_64-pc-windows-msvc, but we build for x86_64-pc-windows-gnu —
          # pkg-config treats that as a cross build and refuses the host's
          # PKG_CONFIG_PATH unless PKG_CONFIG_ALLOW_CROSS=1 is set. We also
          # set the target-suffixed PKG_CONFIG_PATH_x86_64_pc_windows_gnu so
          # build scripts that read the target-specific var still resolve.
          MSYS2_PREFIX="$(cygpath -w /mingw64)"
          PKGCFG="${MSYS2_PREFIX}\\lib\\pkgconfig"
          echo "PKG_CONFIG_PATH=${PKGCFG}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH_x86_64_pc_windows_gnu=${PKGCFG}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS_x86_64_pc_windows_gnu=1" >> "$GITHUB_ENV"
          echo "${MSYS2_PREFIX}\\bin" >> "$GITHUB_PATH"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # On Windows the cloud shell builds for the GNU ABI (x86_64-pc-windows-gnu)
      # so it can link against MSYS2's MinGW GStreamer. The `winres` /
      # `embed-resource` crates pick MSVC vs GNU resource tooling from the
      # **host** triple (HOST env var), not the target — so installing the
      # default stable-x86_64-pc-windows-msvc host produces an MSVC-format
      # `resource.lib` the mingw linker can't consume ("file not recognized").
      # Pin the host toolchain to GNU so winres invokes `windres` and emits
      # a COFF object instead.
      - name: Install Rust (Windows GNU host)
        if: matrix.app == 'cloud' && startsWith(matrix.platform, 'windows')
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable-x86_64-pc-windows-gnu
          targets: ${{ matrix.rust_targets }}

      - name: Install Rust (default host)
        if: '!(matrix.app == ''cloud'' && startsWith(matrix.platform, ''windows''))'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          key: ${{ matrix.app }}-${{ matrix.arch_label }}

      - name: Install Tauri CLI
        if: matrix.app == 'cloud'
        run: cargo install --locked tauri-cli --version "^2"

      - name: Build cloud Tauri bundle (non-Windows)
        if: matrix.app == 'cloud' && !startsWith(matrix.platform, 'windows')
        working-directory: apps/cloud
        shell: bash
        run: |
          if [[ -n "${{ matrix.tauri_target }}" ]]; then
            cargo tauri build --target "${{ matrix.tauri_target }}"
          else
            cargo tauri build
          fi

      # On Windows the .exe links against MSYS2's MinGW GStreamer / GLib
      # (libglib-2.0-0.dll, libgstreamer-1.0-0.dll, libwinpthread-1.dll, …).
      # Those DLLs live in /mingw64/bin on the build host and are NOT on a
      # clean end-user Windows machine. Without bundling them the installed
      # app fails to launch with "the code execution cannot proceed because
      # libglib-2.0-0.dll was not found". Split the build so we can stage
      # the MinGW runtime alongside the .exe before NSIS / WiX bundles it.
      - name: Compile cloud binary (Windows, no bundle)
        if: matrix.app == 'cloud' && startsWith(matrix.platform, 'windows')
        working-directory: apps/cloud
        shell: bash
        run: cargo tauri build --target ${{ matrix.tauri_target }} --no-bundle

      - name: Stage MinGW runtime DLLs (Windows)
        if: matrix.app == 'cloud' && startsWith(matrix.platform, 'windows')
        shell: msys2 {0}
        env:
          TAURI_TARGET: ${{ matrix.tauri_target }}
        run: bash apps/cloud/scripts/stage-windows-runtime.sh

      - name: Bundle cloud installers (Windows)
        if: matrix.app == 'cloud' && startsWith(matrix.platform, 'windows')
        working-directory: apps/cloud
        shell: bash
        run: cargo tauri bundle --target ${{ matrix.tauri_target }} --config tauri.windows.conf.json

      - name: Build headless bin
        if: matrix.app == 'headless'
        shell: bash
        run: pnpm build:headless

      - name: Stage cloud artifacts
        if: matrix.app == 'cloud'
        shell: bash
        run: |
          mkdir -p dist-release
          NAME="mhaol-cloud-${{ matrix.arch_label }}"
          if [[ -n "${{ matrix.tauri_target }}" ]]; then
            BUNDLE="target/${{ matrix.tauri_target }}/release/bundle"
          else
            BUNDLE="target/release/bundle"
          fi
          case "${{ runner.os }}" in
            macOS)
              for f in "$BUNDLE"/dmg/*.dmg; do
                [[ -e "$f" ]] || continue
                cp "$f" "dist-release/${NAME}.dmg"
              done
              if compgen -G "$BUNDLE/macos/*.app" > /dev/null; then
                ( cd "$BUNDLE/macos" && for app in *.app; do
                    zip -ry "$GITHUB_WORKSPACE/dist-release/${NAME}.app.zip" "$app"
                  done )
              fi
              ;;
            Linux)
              for f in "$BUNDLE"/deb/*.deb; do
                [[ -e "$f" ]] || continue
                cp "$f" "dist-release/${NAME}.deb"
              done
              for f in "$BUNDLE"/appimage/*.AppImage; do
                [[ -e "$f" ]] || continue
                cp "$f" "dist-release/${NAME}.AppImage"
              done
              for f in "$BUNDLE"/rpm/*.rpm; do
                [[ -e "$f" ]] || continue
                cp "$f" "dist-release/${NAME}.rpm"
              done
              ;;
            Windows)
              for f in "$BUNDLE"/msi/*.msi; do
                [[ -e "$f" ]] || continue
                cp "$f" "dist-release/${NAME}.msi"
              done
              for f in "$BUNDLE"/nsis/*.exe; do
                [[ -e "$f" ]] || continue
                cp "$f" "dist-release/${NAME}-setup.exe"
              done
              ;;
          esac
          if [[ -z "$(ls -A dist-release 2>/dev/null)" ]]; then
            echo "::error::no Tauri bundle artifacts produced for ${{ matrix.arch_label }}"
            exit 1
          fi
          ls -la dist-release/

      - name: Stage headless artifact
        if: matrix.app == 'headless'
        shell: bash
        run: |
          mkdir -p dist-release stage/mhaol-headless
          cp target/release/mhaol-headless stage/mhaol-headless/
          chmod +x stage/mhaol-headless/mhaol-headless
          tar -czvf "dist-release/mhaol-headless-${{ matrix.arch_label }}.tar.gz" -C stage mhaol-headless
          ls -la dist-release/

      - name: Generate checksums
        shell: bash
        working-directory: dist-release
        run: |
          if command -v shasum >/dev/null; then
            shasum -a 256 * > SHA256SUMS-${{ matrix.app }}-${{ matrix.arch_label }}.txt
          else
            sha256sum * > SHA256SUMS-${{ matrix.app }}-${{ matrix.arch_label }}.txt
          fi
          cat SHA256SUMS-${{ matrix.app }}-${{ matrix.arch_label }}.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mhaol-${{ matrix.app }}-${{ matrix.arch_label }}
          path: dist-release/*
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          fail_on_unmatched_files: true
