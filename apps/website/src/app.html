<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Mhaol — a self-hosted, content-addressed media cloud. Browse, pin, and stream your library across desktops, servers, Android TV, and Android phones."
		/>
		<title>Mhaol — self-hosted media cloud</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			try {
				var stored = localStorage.getItem('mhaol-website:theme');
				if (stored === 'dark' || stored === 'light') {
					document.documentElement.setAttribute('data-theme', stored);
				}
			} catch (e) {}
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
