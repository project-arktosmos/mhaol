[package]
name = "mhaol-cloud"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "mhaol-cloud"
path = "src/server.rs"

[dependencies]
mhaol-node = { path = "../node" }
mhaol-identity = { path = "../../packages/identity" }
axum = { version = "0.8", features = ["ws"] }
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.6", features = ["cors", "fs"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rust-embed = "8"
mime_guess = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
once_cell = "1"

[target.'cfg(not(target_os = "android"))'.dependencies]
mhaol-p2p-stream = { path = "../../packages/p2p-stream" }
