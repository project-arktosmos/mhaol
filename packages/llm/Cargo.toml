[package]
name = "mhaol-llm"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "mhaol_llm"
path = "src/lib.rs"

[dependencies]
parking_lot = "0.12"
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["sync"] }
tracing = "0.1"

[target.'cfg(not(target_os = "android"))'.dependencies]
llama_cpp = "0.3"

[target.'cfg(target_os = "macos")'.dependencies]
llama_cpp = { version = "0.3", features = ["metal"] }
