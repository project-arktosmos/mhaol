[package]
name = "mhaol-queue"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "mhaol_queue"
path = "src/lib.rs"

[dependencies]
parking_lot = "0.12"
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync"] }
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
tracing = "0.1"
