[package]
name = "mhaol-ipfs-stream"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "mhaol_ipfs_stream"
path = "src/lib.rs"

[dependencies]
mhaol-ipfs = { path = "../ipfs" }
gstreamer = "0.24"
gstreamer-app = "0.24"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time", "fs", "io-util"] }
thiserror = "2.0"
tracing = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
parking_lot = "0.12"
anyhow = "1.0"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
tempfile = "3"
