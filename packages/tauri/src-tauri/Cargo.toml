[package]
name = "mhaol-tauri-core"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "mhaol_tauri_core"
crate-type = ["rlib"]

[dependencies]
tauri = { version = "2.10", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
axum = "0.8"
mhaol-backend = { path = "../../backend" }
