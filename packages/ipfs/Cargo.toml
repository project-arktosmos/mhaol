[package]
name = "mhaol-ipfs"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
rust-ipfs = "0.14"
# `rust-ipfs 0.14.1` calls `Code::Sha2_256` but declares
# `multihash-codetable` with `default-features = false` and no `sha2` feature.
# We re-declare it here with the `sha2` feature so cargo's feature unification
# turns the variant on for the rust-ipfs build.
multihash-codetable = { version = "0.1", default-features = false, features = ["sha2"] }
# Pull libp2p with the `pnet` and `tcp`+`tokio`+`noise`+`yamux`+`dns` features
# enabled. Cargo unifies these with rust-ipfs's libp2p dep so the
# `libp2p::pnet` re-export becomes available without a version mismatch.
libp2p = { version = "0.54", default-features = false, features = ["pnet", "tcp", "tokio", "noise", "yamux", "dns"] }
cid = "0.11"
bytes = "1"
# rust-ipfs 0.14.1 has a bug in `add_unixfs` where single-chunk files (every
# file ≤ 256KiB, e.g. all GBC ROMs) yield `InvalidData` because its push-loop
# never tracks `last_cid` and `finish()` returns 0 blocks for a single
# pending link. We work around it in `manager::add` by driving rust-unixfs's
# `FileAdder` ourselves and writing blocks via the public Repo API.
rust-unixfs = "0.5"
rand = "0.8"
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1.0"
parking_lot = "0.12"
tokio = { version = "1", features = ["full"] }
log = "0.4"
url = "2"
axum = { version = "0.8", features = ["ws"] }
tokio-stream = "0.1"
async-stream = "0.3"
futures-util = { version = "0.3", default-features = false, features = ["sink"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["full", "test-util"] }
