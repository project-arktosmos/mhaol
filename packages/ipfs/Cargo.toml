[package]
name = "mhaol-ipfs"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
rust-ipfs = "0.14"
# `rust-ipfs 0.14.1` calls `Code::Sha2_256` but declares
# `multihash-codetable` with `default-features = false` and no `sha2` feature.
# We re-declare it here with the `sha2` feature so cargo's feature unification
# turns the variant on for the rust-ipfs build.
multihash-codetable = { version = "0.1", default-features = false, features = ["sha2"] }
cid = "0.11"
bytes = "1"
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1.0"
parking_lot = "0.12"
tokio = { version = "1", features = ["full"] }
log = "0.4"
url = "2"
axum = { version = "0.8", features = ["ws"] }
tokio-stream = "0.1"
async-stream = "0.3"
futures-util = { version = "0.3", default-features = false, features = ["sink"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["full", "test-util"] }
