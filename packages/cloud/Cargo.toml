[package]
name = "mhaol-cloud"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "mhaol_cloud"
path = "src-rs/lib.rs"

[dependencies]
axum = "0.8"
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
parking_lot = "0.12"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
