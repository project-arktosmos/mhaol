[package]
name = "mhaol-backend"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "mhaol_backend"
path = "src/lib.rs"

[[bin]]
name = "mhaol-cloud"
path = "src/bin/mhaol-cloud.rs"

[dependencies]
mhaol-identity = { path = "../identity" }
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["io"] }
tower-http = { version = "0.6", features = ["cors", "fs"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rust-embed = "8"
mime_guess = "2"
walkdir = "2"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
once_cell = "1"
parking_lot = "0.12"
surrealdb = { version = "2", features = ["kv-rocksdb"] }
dirs = "5"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
cid = "0.11"
multihash = "0.19"
sha2 = "0.10"
sha3 = "0.10"
hex = "0.4"
url = "2"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
regex = "1"
sysinfo = { version = "0.33", default-features = false, features = ["disk"] }

[target.'cfg(not(target_os = "android"))'.dependencies]
async-stream = "0.3"
async-trait = "0.1"
tokio-stream = "0.1"
mhaol-ipfs-stream = { path = "../ipfs-stream" }
mhaol-yt-dlp = { path = "../yt-dlp" }
mhaol-torrent = { path = "../torrent" }
mhaol-ipfs-core = { path = "../ipfs-core" }
zip = { version = "2", default-features = false, features = ["deflate", "bzip2"] }
sevenz-rust2 = "0.13"
