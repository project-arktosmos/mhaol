[package]
name = "mhaol-backend"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "mhaol_backend"
path = "src/lib.rs"

[[bin]]
name = "mhaol-server"
path = "src/server.rs"

[dependencies]
axum = "0.8"
tower-http = { version = "0.6", features = ["cors"] }
tokio = { version = "1", features = ["full"] }
rusqlite = { version = "0.31", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
uuid = { version = "1", features = ["v4"] }
tokio-stream = "0.1"
async-stream = "0.3"
tracing = "0.1"
k256 = { version = "0.13", features = ["ecdsa"] }
sha3 = "0.10"
hex = "0.4"
rand = "0.8"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2.0"
parking_lot = "0.12"
chrono = "0.4"
mhaol-yt-dlp = { path = "../rust-yt-dlp" }
mhaol-torrent = { path = "../rust-torrent" }
mhaol-p2p-stream = { path = "../p2p-stream" }
anyhow = "1"
urlencoding = "2"
ort = { version = "2.0.0-rc.11", features = ["ndarray"] }
ndarray = "0.17"
tokenizers = { version = "0.22", default-features = false, features = ["onig"] }
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "gif", "bmp", "webp"] }
hf-hub = { version = "0.5", features = ["tokio"] }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
