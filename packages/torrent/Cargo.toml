[package]
name = "mhaol-torrent"
version = "0.1.0"
edition = "2021"

[dependencies]
librqbit = { version = "8", default-features = false, features = ["rust-tls", "tracing-subscriber-utils"] }
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
anyhow = "1.0"
parking_lot = "0.12"
tokio = { version = "1", features = ["full"] }
log = "0.4"
url = "2"
axum = { version = "0.8", features = ["ws"] }
futures-util = { version = "0.3", default-features = false, features = ["sink"] }
tokio-stream = "0.1"
async-stream = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
urlencoding = "2"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["full", "test-util"] }
