[package]
name = "mhaol-identity"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "mhaol_identity"
path = "src/lib.rs"

[dependencies]
k256 = { version = "0.13", features = ["ecdsa"] }
sha3 = "0.10"
hex = "0.4"
rand = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "5"

[dev-dependencies]
uuid = { version = "1", features = ["v4"] }
