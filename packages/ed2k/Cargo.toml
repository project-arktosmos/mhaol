[package]
name = "mhaol-ed2k"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
anyhow = "1.0"
parking_lot = "0.12"
tokio = { version = "1", features = ["full"] }
log = "0.4"
axum = { version = "0.8", features = ["ws"] }
async-stream = "0.3"
tokio-stream = "0.1"
md4 = "0.10"
hex = "0.4"
urlencoding = "2"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["full", "test-util"] }
