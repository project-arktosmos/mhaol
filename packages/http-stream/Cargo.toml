[package]
name = "mhaol-http-stream"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = { version = "0.8" }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
